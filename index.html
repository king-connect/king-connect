<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGConnect PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER FIXO NO TOPO */
        .header-main { background: #000; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-main h1 { font-size: 24px; font-weight: bold; }
        .icon-user { width: 32px; height: 32px; cursor: pointer; filter: invert(1); }

        /* ÁREA DE CONTEÚDO DINÂMICO */
        #main-content { flex: 1; overflow-y: auto; padding-bottom: 90px; position: relative; }
        .empty-state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .empty-text { font-size: 22px; font-weight: 800; color: #000; text-transform: uppercase; }

        /* LISTA DE CONVERSAS */
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; background: #eee; margin-right: 15px; object-fit: cover; }
        .chat-info h4 { font-size: 18px; color: #000; }

        /* BOTÃO + FLUTUANTE ACIMA DO MENU */
        .btn-add-chat { position: fixed; bottom: 100px; right: 25px; font-size: 45px; font-weight: bold; color: #000; cursor: pointer; z-index: 5; text-decoration: none; }

        /* NAV BAR FIXA NO RODAPÉ (CORRIGIDO) */
        .nav-bar { background: #000; height: 80px; display: flex; justify-content: space-around; align-items: center; width: 100%; position: fixed; bottom: 0; left: 0; z-index: 10; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; color: white; text-decoration: none; }
        .nav-item img { width: 28px; filter: invert(1); }
        .nav-item span { font-size: 11px; font-weight: bold; }

        /* MODAIS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .input-king { width: 100%; max-width: 300px; padding: 15px; border-radius: 25px; border: none; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .btn-king { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; max-width: 300px; margin-top: 10px; }

        /* PERFIL */
        .profile-img-edit { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; margin-bottom: 15px; cursor: pointer; object-fit: cover; }
    </style>
</head>
<body>

    <div id="login-modal" class="modal-overlay" style="display: flex;">
        <h2>KING LOGIN</h2>
        <input type="text" id="auth-user" class="input-king" placeholder="Usuário">
        <input type="password" id="auth-pass" class="input-king" placeholder="Senha">
        <button class="btn-king" onclick="executarAuth()">ENTRAR</button>
        <p onclick="toggleModoRegistro()" id="switch-text" style="margin-top:15px; cursor:pointer;">Criar Conta</p>
    </div>

    <div id="perfil-modal" class="modal-overlay">
        <img id="edit-foto-preview" class="profile-img-edit" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="alterarFoto()">
        <input type="text" id="edit-nome" class="input-king" placeholder="Nome Exibido">
        <input type="text" id="edit-bio" class="input-king" placeholder="Sua Biografia">
        <button class="btn-king" style="background:#a349a4; color:#fff;" onclick="salvarPerfil()">SALVAR ALTERAÇÕES</button>
        <button class="btn-king" onclick="document.getElementById('perfil-modal').style.display='none'">CANCELAR</button>
        <button class="btn-king" style="color:red;" onclick="logout()">DESLOGAR</button>
    </div>

    <header class="header-main">
        <h1>KINGConnect</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="icon-user" onclick="abrirEdicaoPerfil()">
    </header>

    <div id="main-content">
        <div id="empty-msg" class="empty-state">
            <h2 class="empty-text">OLÁ VOCÊ AINDA NÃO TEM CONVERSAS? INICIE UMA AGORA!</h2>
        </div>
        <div id="chats-lista"></div>
    </div>

    <div class="btn-add-chat" onclick="buscarUsuario()">+</div>

    <nav class="nav-bar">
        <div class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1380/1380338.png">
            <span>Mensagem</span>
        </div>
        <div class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png">
            <span>Post</span>
        </div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9YUu-ovvkUnB5xRdWKhroDoUsSw3MEXY",
            authDomain: "king-connect-2026.firebaseapp.com",
            projectId: "king-connect-2026",
            storageBucket: "king-connect-2026.appspot.com",
            databaseURL: "https://king-connect-2026-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const fb = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('king_user'));
        let modoRegistro = false;

        if(currentUser) {
            document.getElementById('login-modal').style.display = 'none';
            carregarMinhasConversas();
        }

        function toggleModoRegistro() {
            modoRegistro = !modoRegistro;
            document.querySelector('#login-modal h2').innerText = modoRegistro ? "CRIAR CONTA" : "KING LOGIN";
        }

        async function executarAuth() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!user || !pass) return alert("Preencha tudo!");
            const id = user.toLowerCase().replace(/[.#$[\]]/g, "_");

            const ref = fb.ref('users/' + id);
            const snap = await ref.once('value');

            if(modoRegistro) {
                if(snap.exists()) return alert("Usuário já existe!");
                const data = { id, nome: user, pass, bio: "Disponível", foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
                await ref.set(data);
                loginLocal(data);
            } else {
                if(!snap.exists() || snap.val().pass !== pass) return alert("Erro no login!");
                loginLocal(snap.val());
            }
        }

        function loginLocal(data) {
            localStorage.setItem('king_user', JSON.stringify(data));
            location.reload();
        }

        function logout() { localStorage.clear(); location.reload(); }

        // EDITAR PERFIL
        function abrirEdicaoPerfil() {
            document.getElementById('edit-nome').value = currentUser.nome;
            document.getElementById('edit-bio').value = currentUser.bio;
            document.getElementById('edit-foto-preview').src = currentUser.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('perfil-modal').style.display = 'flex';
        }

        function alterarFoto() {
            const novaFoto = prompt("Cole o link da sua nova foto de perfil:");
            if(novaFoto) document.getElementById('edit-foto-preview').src = novaFoto;
        }

        async function salvarPerfil() {
            const novoNome = document.getElementById('edit-nome').value;
            const novaBio = document.getElementById('edit-bio').value;
            const novaFoto = document.getElementById('edit-foto-preview').src;

            const updates = { nome: novoNome, bio: novaBio, foto: novaFoto };
            await fb.ref('users/' + currentUser.id).update(updates);
            
            currentUser = {...currentUser, ...updates};
            localStorage.setItem('king_user', JSON.stringify(currentUser));
            alert("Perfil Atualizado!");
            document.getElementById('perfil-modal').style.display = 'none';
        }

        // BUSCAR E INICIAR CONVERSA
        async function buscarUsuario() {
            const busca = prompt("Nome do usuário:");
            if(!busca) return;
            const idBusca = busca.toLowerCase().replace(/[.#$[\]]/g, "_");
            
            const snap = await fb.ref('users/' + idBusca).once('value');
            if(snap.exists()) {
                const alvo = snap.val();
                // Salva que existe uma conversa entre vocês
                await fb.ref(`conversas/${currentUser.id}/${idBusca}`).set({ nome: alvo.nome, foto: alvo.foto });
                await fb.ref(`conversas/${idBusca}/${currentUser.id}`).set({ nome: currentUser.nome, foto: currentUser.foto });
                carregarMinhasConversas();
            } else {
                alert("Usuário não existe!");
            }
        }

        function carregarMinhasConversas() {
            fb.ref(`conversas/${currentUser.id}`).on('value', snap => {
                const lista = document.getElementById('chats-lista');
                const empty = document.getElementById('empty-msg');
                lista.innerHTML = "";
                
                if(snap.exists()) {
                    empty.style.display = "none";
                    snap.forEach(child => {
                        const c = child.val();
                        lista.innerHTML += `
                            <div class="chat-item">
                                <img src="${c.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                                <div class="chat-info"><h4>${c.nome}</h4><p>Toque para conversar</p></div>
                            </div>
                        `;
                    });
                } else {
                    empty.style.display = "flex";
                }
            });
        }
    </script>
</body>
</html>
