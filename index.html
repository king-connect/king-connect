<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGConnect PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 15px; }
        .input-login { width: 80%; max-width: 300px; padding: 15px; border-radius: 25px; border: none; outline: none; font-weight: bold; text-align: center; color: #000; background: #fff; }
        .btn-login { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; width: 80%; max-width: 300px; }
        .btn-create { background: #a349a4; color: #fff; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; width: 80%; max-width: 300px; }
        
        #success-screen { display: none; text-align: center; }

        #main-ui { display: flex; flex-direction: column; height: 100vh; background: #fff; }
        .header-main { background: #000; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-list { flex: 1; overflow-y: auto; }
        .empty-state { padding: 40px; text-align: center; font-weight: 800; color: #ccc; }

        #chat-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; z-index: 100; }
        .chat-header { background: #000; color: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-footer { background: #000; padding: 12px; display: flex; align-items: center; gap: 10px; }
        
        .nav-bar { background: #000; height: 70px; display: flex; justify-content: space-around; align-items: center; color: white; }
    </style>
</head>
<body onclick="registrarClique(event)">

    <div id="login-modal" class="modal-overlay">
        <h2 id="auth-title">KING LOGIN</h2>
        <input type="text" id="auth-user" class="input-login" placeholder="Nome de Usuário">
        <input type="password" id="auth-pass" class="input-login" placeholder="Senha">
        <input type="text" id="reg-foto" class="input-login" placeholder="Link da Foto (Opcional)" style="display:none;">
        
        <button id="btn-main-auth" class="btn-login" onclick="executarAuth()">CONECTAR</button>
        <button id="btn-switch-auth" class="btn-create" onclick="toggleModoRegistro()">CRIAR CONTA</button>
        <button style="background:transparent; color:gray; border:none; cursor: pointer;" onclick="toggleLogin()">FECHAR</button>
    </div>

    <div id="success-screen" class="modal-overlay">
        <div style="font-size: 50px;">👑</div>
        <h2>PARABÉNS!</h2>
        <p>Sua conta foi criada com sucesso!</p>
        <button class="btn-login" onclick="entrarAposSucesso()">COMEÇAR</button>
    </div>

    <div id="main-ui">
        <header class="header-main">
            <h1>KINGConnect</h1>
            <button style="background:none; border:none; color:white; font-size: 20px;" onclick="toggleLogin()">⚙️</button>
        </header>
        <div id="chat-list"></div>
        <nav class="nav-bar"><div>💬 Mensagem</div><div>💟 Post</div></nav>
    </div>

    <script>
        // CONFIGURAÇÃO CORRIGIDA - Verifique se a databaseURL termina em .firebaseio.com
        const firebaseConfig = {
            apiKey: "AIzaSyD9YUu-ovvkUnB5xRdWKhroDoUsSw3MEXY",
            authDomain: "king-connect-2026.firebaseapp.com",
            projectId: "king-connect-2026",
            storageBucket: "king-connect-2026.appspot.com",
            messagingSenderId: "544763144816",
            appId: "1:544763144816:web:36cbde7f987ad38afe22b5",
            databaseURL: "https://king-connect-2026-default-rtdb.firebaseio.com" // IMPORTANTE
        };

        firebase.initializeApp(firebaseConfig);
        const fb = firebase.database();

        let currentUser = null;
        let modoRegistro = false;

        function toggleLogin() {
            const m = document.getElementById('login-modal');
            m.style.display = (m.style.display === 'none') ? 'flex' : 'none';
        }

        function toggleModoRegistro() {
            modoRegistro = !modoRegistro;
            document.getElementById('auth-title').innerText = modoRegistro ? "NOVA CONTA" : "KING LOGIN";
            document.getElementById('btn-main-auth').innerText = modoRegistro ? "FINALIZAR CADASTRO" : "CONECTAR";
            document.getElementById('reg-foto').style.display = modoRegistro ? "block" : "none";
        }

        async function executarAuth() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value;
            
            if(!user || !pass) return alert("Preencha os campos!");

            // Gera um ID limpo para o Firebase
            const userId = user.toLowerCase().replace(/[.#$[\]]/g, "_");

            try {
                const userRef = fb.ref('users/' + userId);
                const snap = await userRef.once('value');
                const data = snap.val();

                if (modoRegistro) {
                    if (data) return alert("Usuário já existe!");
                    
                    const foto = document.getElementById('reg-foto').value;
                    currentUser = { id: userId, nome: user, pass: pass, foto: foto };
                    
                    // SALVANDO NO FIREBASE
                    await userRef.set(currentUser);
                    await fb.ref('data/' + userId).set({ conversas: {} });

                    document.getElementById('login-modal').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'flex';
                } else {
                    if (!data || data.pass !== pass) return alert("Usuário ou senha incorretos!");
                    currentUser = data;
                    entrarAposSucesso();
                }
            } catch (error) {
                console.error(error);
                alert("Erro ao conectar. Verifique seu console.");
            }
        }

        function entrarAposSucesso() {
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('login-modal').style.display = 'none';
            alert("Bem-vindo, " + currentUser.nome);
        }

        function registrarClique(e) {
            if(!currentUser) return;
            fb.ref('cliques/' + currentUser.id).push({
                item: e.target.tagName,
                hora: new Date().toLocaleTimeString()
            });
        }
    </script>
</body>
</html>
