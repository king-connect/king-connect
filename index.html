<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGConnect PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .caixa { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 25px; border: none; text-align: center; font-weight: bold; }
        .btn-fim { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #sucesso { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>

    <div class="caixa" id="tela-cadastro">
        <h2 style="margin-bottom: 20px;">NOVA CONTA</h2>
        <input type="text" id="user" placeholder="Nome de Usuário">
        <input type="password" id="pass" placeholder="Sua Senha">
        <button class="btn-fim" onclick="salvarNoFirebase()">FINALIZAR CADASTRO</button>
    </div>

    <div id="sucesso">
        <div style="font-size: 70px;">👑</div>
        <h1 style="margin: 20px 0;">PARABÉNS!</h1>
        <p style="color: #a349a4; font-weight: bold;">Sua conta foi criada com sucesso!</p>
        <button class="btn-fim" style="width: 200px; margin-top: 30px;" onclick="location.reload()">COMEÇAR</button>
    </div>

    <script>
        // Sua configuração do Firebase (NÃO TRADUZIR)
        const firebaseConfig = {
            apiKey: "AIzaSyD9YUu-ovvkUnB5xRdWKhroDoUsSw3MEXY",
            authDomain: "king-connect-2026.firebaseapp.com",
            projectId: "king-connect-2026",
            storageBucket: "king-connect-2026.appspot.com",
            databaseURL: "https://king-connect-2026-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function salvarNoFirebase() {
            const nome = document.getElementById('user').value.trim();
            const senha = document.getElementById('pass').value;

            if(!nome || !senha) {
                alert("Por favor, preencha o usuário e a senha!");
                return;
            }

            // Limpa o nome para não dar erro no Firebase
            const idUsuario = nome.toLowerCase().replace(/[.#$[\]]/g, "_");

            try {
                // SALVA OS DADOS
                await db.ref('usuarios/' + idUsuario).set({
                    login: nome,
                    senha: senha,
                    data: new Date().toLocaleString()
                });

                // MOSTRA A TELA DE SUCESSO
                document.getElementById('tela-cadastro').style.display = 'none';
                document.getElementById('sucesso').style.display = 'flex';

            } catch (erro) {
                console.error(erro);
                alert("Erro ao salvar! Verifique se as REGRAS do banco estão em 'true'.");
            }
        }
    </script>
</body>
</html>
